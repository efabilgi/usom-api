name: USOM Guncelleme

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Depoyu Kopyala
      uses: actions/checkout@v3

    - name: Temiz USOM Verisini Çek
      run: |
        python -c "
        import urllib.request
        # GitHub engeline takılmayan, topluluk tarafından beslenen açık txt/json havuzu
        url = 'https://raw.githubusercontent.com/v0kan/usom-blocklist/main/usom-domain.txt'
        
        try:
            req = urllib.request.Request(url, headers={'User-Agent': 'Mozilla/5.0'})
            with urllib.request.urlopen(req) as r:
                content = r.read().decode('utf-8')
                
            if content and len(content) > 100:
                with open('usom_listesi.txt', 'w', encoding='utf-8') as f:
                    f.write(content)
                print('Liste basariyla gercek verilerle guncellendi.')
            else:
                print('Gelen veri cok kisa veya bos, islem iptal.')
        except Exception as e:
            print('Baglanti hatasi:', e)
        "

    - name: Degisiklikleri Kaydet ve Yukle
      run: |
        git config --global user.name 'GitHub Action'
        git config --global user.email 'action@github.com'
        git add usom_listesi.txt
        git commit -m "USOM Listesi Gercek Verilerle Guncellendi" || exit 0
        git push origin main
