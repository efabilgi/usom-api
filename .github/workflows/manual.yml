name: USOM Guncelleme

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Depoyu Kopyala
      uses: actions/checkout@v3

    - name: Garanti Havuzdan Veriyi Cek
      run: |
        python -c "
        import urllib.request
        # Cloudflare / Küresel siber güvenlik topluluklarının doğrudan resmi USOM'dan anlık klonladığı açık istihbarat listesi
        url = 'https://raw.githubusercontent.com/borestad/blocklist-tr/main/blocklist-tr.txt'
        
        try:
            req = urllib.request.Request(url, headers={'User-Agent': 'Mozilla/5.0'})
            with urllib.request.urlopen(req) as r:
                content = r.read().decode('utf-8')
                
            if content and len(content) > 1000:
                with open('usom_listesi.txt', 'w', encoding='utf-8') as f:
                    f.write(content)
                print('Liste temiz ve gercek verilerle esitlendi.')
            else:
                print('Veri boyutu yetersiz.')
        except Exception as e:
            print('Hata:', e)
        "

    - name: Degisiklikleri Kaydet ve Yukle
      run: |
        git config --global user.name 'GitHub Action'
        git config --global user.email 'action@github.com'
        git add usom_listesi.txt
        git commit -m "USOM Listesi Guncellendi" || exit 0
        git push origin main
