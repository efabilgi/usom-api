name: USOM Guncelleme

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Depoyu Kopyala
      uses: actions/checkout@v3

    - name: Python Veri Yazma
      run: |
        python -c "
        import json, urllib.request, ssl
        ctx = ssl._create_unverified_context()
        # GitHub engeline takılmayan alternatif resmi USOM veri havuzu adresi
        url = 'https://www.usom.gov.tr/api/address/index?per-page=1000'
        headers = {
            'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36',
            'Accept': 'application/json'
        }
        
        try:
            req = urllib.request.Request(url, headers=headers)
            with urllib.request.urlopen(req, context=ctx) as r:
                res = r.read().decode('utf-8')
                data = json.loads(res)
                items = data.get('models', data.get('data', []))
                print(f'API basariyla okundu. {len(items)} adet veri bulundu.')
        except Exception as e:
            print('Yine filtreye takildi, eski listeden devam ediliyor:', e)
            items = []

        # Eğer API'den veri geldiyse dosyayı doldur, gelmediyse dosyayı bozma
        if items:
            with open('usom_listesi.txt', 'w', encoding='utf-8') as f:
                for item in items:
                    addr = item.get('url', item.get('address', ''))
                    if addr: f.write(f'{addr}\n')
            print('Dosya guncel USOM verileriyle yenilendi.')
        "

    - name: Degisiklikleri Kaydet ve Yukle
      run: |
        git config --global user.name 'GitHub Action'
        git config --global user.email 'action@github.com'
        git add usom_listesi.txt
        git commit -m "USOM Listesi Guncellendi" || exit 0
        git push origin main
