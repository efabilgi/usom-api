name: USOM Guncelleme

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Depoyu Kopyala
      uses: actions/checkout@v3

    - name: Gunluk USOM Verisini Cek
      run: |
        python -c "
        import urllib.request
        # Doğrudan çalışan, güncel ve bot engeli olmayan temiz USOM domain havuzu
        url = 'https://raw.githubusercontent.com/v0kan/usom-feed/main/usom_domain.txt'
        
        try:
            req = urllib.request.Request(url, headers={'User-Agent': 'Mozilla/5.0'})
            with urllib.request.urlopen(req) as r:
                content = r.read().decode('utf-8')
                
            if content and len(content) > 500:
                with open('usom_listesi.txt', 'w', encoding='utf-8') as f:
                    f.write(content)
                print('USOM listesi gercek verilerle senkronize edildi.')
            else:
                print('Gelen veri yetersiz görünüyor, dosya güncellenmedi.')
        except Exception as e:
            print('İndirme sirasinda hata olustu:', e)
        "

    - name: Degisiklikleri Kaydet ve Yukle
      run: |
        git config --global user.name 'GitHub Action'
        git config --global user.email 'action@github.com'
        git add usom_listesi.txt
        git commit -m "USOM Listesi Gercek Verilerle Guncellendi" || exit 0
        git push origin main
